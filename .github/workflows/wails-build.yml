name: Wails Multi-Platform Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: 'Linux'
            os: 'ubuntu-latest'
            flags: '-tags webkit2_41'
          - name: 'Windows'
            os: 'windows-latest'
            flags: ''
          - name: 'macOS'
            os: 'macos-latest'
            flags: ''

    runs-on: ${{ matrix.build.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: matrix.build.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Build Application
        run: |
          export PATH="${PATH}:$(go env GOPATH)/bin"
          # Use system pkg-config on Linux
          if [ "${{ matrix.build.name }}" == "Linux" ]; then export PKG_CONFIG=/usr/bin/pkg-config; fi
          wails build ${{ matrix.build.flags }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nmea-gen-${{ matrix.build.name }}
          path: |
            build/bin/nmea-gen
            build/bin/nmea-gen.exe
            build/bin/*.app
            build/bin/*.dmg
